// Simplified subset of Hubble Observer service from cilium/cilium v1.19.2.
// Only the RPCs and types needed by the SRE Portal flow observer are included.
// Original source: https://github.com/cilium/cilium/blob/v1.19.2/api/v1/observer/observer.proto
//
// SPDX-License-Identifier: Apache-2.0
// Copyright Authors of Hubble

syntax = "proto3";

import "google/protobuf/timestamp.proto";
import public "flow/flow.proto";
import "relay/relay.proto";

package observer;

option go_package = "github.com/golgoth31/sreportal/internal/flowobserver/hubblegen/observer";

// Observer returns a stream of Flows from Hubble.
service Observer {
    // GetFlows returns a stream of flows matching the given filters.
    rpc GetFlows(GetFlowsRequest) returns (stream GetFlowsResponse) {}

    // ServerStatus returns Hubble server health information.
    rpc ServerStatus(ServerStatusRequest) returns (ServerStatusResponse) {}
}

message ServerStatusRequest {}

message ServerStatusResponse {
    uint64 num_flows = 1;
    uint64 max_flows = 2;
    uint64 seen_flows = 3;
    uint64 uptime_ns = 4;
    // Fields 5-9 omitted (connected/unavailable nodes, version, flows_rate).
}

message GetFlowsRequest {
    // number limits returned flows. Incompatible with since/until.
    uint64 number = 1;
    // Fields 2 reserved, 9 (first) omitted.

    // follow keeps the stream open after returning buffered flows.
    bool follow = 3;

    // blacklist excludes matching flows.
    repeated flow.FlowFilter blacklist = 5;
    // whitelist includes only matching flows.
    repeated flow.FlowFilter whitelist = 6;

    // since returns flows after this timestamp. Incompatible with number.
    google.protobuf.Timestamp since = 7;
    // until returns flows before this timestamp. Incompatible with number.
    google.protobuf.Timestamp until = 8;

    // Remaining fields omitted (first, field_mask, experimental, extensions).
}

message GetFlowsResponse {
    oneof response_types {
        flow.Flow flow = 1;
        relay.NodeStatusEvent node_status = 2;
        flow.LostEvent lost_events = 3;
    }
    string node_name = 1000;
    google.protobuf.Timestamp time = 1001;
}
