syntax = "proto3";

package sreportal.v1;

import "google/protobuf/timestamp.proto";

// StatusService provides access to platform status page data
service StatusService {
  // --- Read RPCs (public) ---

  // ListComponents returns all platform components with their status
  rpc ListComponents(ListComponentsRequest) returns (ListComponentsResponse);

  // ListMaintenances returns maintenance windows
  rpc ListMaintenances(ListMaintenancesRequest) returns (ListMaintenancesResponse);

  // ListIncidents returns declared incidents
  rpc ListIncidents(ListIncidentsRequest) returns (ListIncidentsResponse);

  // --- Write RPCs (auth-protected) ---

  // CreateComponent creates a new platform component CR
  rpc CreateComponent(CreateComponentRequest) returns (CreateComponentResponse);

  // UpdateComponent updates an existing platform component CR
  rpc UpdateComponent(UpdateComponentRequest) returns (UpdateComponentResponse);

  // DeleteComponent deletes a platform component CR
  rpc DeleteComponent(DeleteComponentRequest) returns (DeleteComponentResponse);

  // CreateMaintenance creates a new maintenance window CR
  rpc CreateMaintenance(CreateMaintenanceRequest) returns (CreateMaintenanceResponse);

  // UpdateMaintenance updates an existing maintenance window CR
  rpc UpdateMaintenance(UpdateMaintenanceRequest) returns (UpdateMaintenanceResponse);

  // DeleteMaintenance deletes a maintenance window CR
  rpc DeleteMaintenance(DeleteMaintenanceRequest) returns (DeleteMaintenanceResponse);

  // CreateIncident creates a new incident CR
  rpc CreateIncident(CreateIncidentRequest) returns (CreateIncidentResponse);

  // UpdateIncident updates an existing incident CR, appending a timeline entry
  rpc UpdateIncident(UpdateIncidentRequest) returns (UpdateIncidentResponse);

  // DeleteIncident deletes an incident CR
  rpc DeleteIncident(DeleteIncidentRequest) returns (DeleteIncidentResponse);
}

// ComponentStatus describes the operational status of a platform component
enum ComponentStatus {
  COMPONENT_STATUS_UNSPECIFIED = 0;
  COMPONENT_STATUS_OPERATIONAL = 1;
  COMPONENT_STATUS_DEGRADED = 2;
  COMPONENT_STATUS_PARTIAL_OUTAGE = 3;
  COMPONENT_STATUS_MAJOR_OUTAGE = 4;
  COMPONENT_STATUS_UNKNOWN = 5;
  COMPONENT_STATUS_MAINTENANCE = 6;
}

// MaintenancePhase describes the lifecycle of a maintenance window
enum MaintenancePhase {
  MAINTENANCE_PHASE_UNSPECIFIED = 0;
  MAINTENANCE_PHASE_UPCOMING = 1;
  MAINTENANCE_PHASE_IN_PROGRESS = 2;
  MAINTENANCE_PHASE_COMPLETED = 3;
}

// IncidentPhase describes the resolution stage of an incident
enum IncidentPhase {
  INCIDENT_PHASE_UNSPECIFIED = 0;
  INCIDENT_PHASE_INVESTIGATING = 1;
  INCIDENT_PHASE_IDENTIFIED = 2;
  INCIDENT_PHASE_MONITORING = 3;
  INCIDENT_PHASE_RESOLVED = 4;
}

// IncidentSeverity describes how severe an incident is
enum IncidentSeverity {
  INCIDENT_SEVERITY_UNSPECIFIED = 0;
  INCIDENT_SEVERITY_CRITICAL = 1;
  INCIDENT_SEVERITY_MAJOR = 2;
  INCIDENT_SEVERITY_MINOR = 3;
}

// DailyComponentStatus records the worst observed status for a single UTC calendar day
message DailyComponentStatus {
  string date = 1;
  ComponentStatus worst_status = 2;
}

// ComponentResource represents a platform component on the status page
message ComponentResource {
  string name = 1;
  string display_name = 2;
  string description = 3;
  string group = 4;
  string link = 5;
  string portal_ref = 6;
  ComponentStatus declared_status = 7;
  ComponentStatus computed_status = 8;
  int32 active_incidents = 9;
  google.protobuf.Timestamp last_status_change = 10;
  repeated DailyComponentStatus daily_worst_status = 11;
}

// MaintenanceResource represents a scheduled maintenance window
message MaintenanceResource {
  string name = 1;
  string title = 2;
  string description = 3;
  string portal_ref = 4;
  repeated string components = 5;
  google.protobuf.Timestamp scheduled_start = 6;
  google.protobuf.Timestamp scheduled_end = 7;
  string affected_status = 8;
  MaintenancePhase phase = 9;
}

// IncidentResource represents a declared incident
message IncidentResource {
  string name = 1;
  string title = 2;
  string portal_ref = 3;
  repeated string components = 4;
  IncidentSeverity severity = 5;
  IncidentPhase current_phase = 6;
  repeated IncidentUpdate updates = 7;
  google.protobuf.Timestamp started_at = 8;
  google.protobuf.Timestamp resolved_at = 9;
  int32 duration_minutes = 10;
}

// IncidentUpdate is a single timeline entry in an incident
message IncidentUpdate {
  google.protobuf.Timestamp timestamp = 1;
  IncidentPhase phase = 2;
  string message = 3;
}

// --- Read request/response messages ---

// ListComponentsRequest filters components
message ListComponentsRequest {
  string portal_ref = 1;
  string group = 2;
}

// ListComponentsResponse contains the list of components
message ListComponentsResponse {
  repeated ComponentResource components = 1;
}

// ListMaintenancesRequest filters maintenances
message ListMaintenancesRequest {
  string portal_ref = 1;
  MaintenancePhase phase = 2;
}

// ListMaintenancesResponse contains the list of maintenances
message ListMaintenancesResponse {
  repeated MaintenanceResource maintenances = 1;
}

// ListIncidentsRequest filters incidents
message ListIncidentsRequest {
  string portal_ref = 1;
  IncidentPhase phase = 2;
}

// ListIncidentsResponse contains the list of incidents
message ListIncidentsResponse {
  repeated IncidentResource incidents = 1;
}

// --- Write request/response messages ---

// CreateComponentRequest creates a new Component CR
message CreateComponentRequest {
  reserved 1;
  // display_name is the human-readable name shown on the status page (required)
  string display_name = 2;
  // description is a short text displayed below the component name
  string description = 3;
  // group is a logical grouping (e.g. "Infrastructure", "Applications") (required)
  string group = 4;
  // link is an optional external URL
  string link = 5;
  // portal_ref is the Portal this component is linked to (required)
  string portal_ref = 6;
  // status is the declared operational status
  ComponentStatus status = 7;
}

// CreateComponentResponse is returned after creating a component
message CreateComponentResponse {
  string name = 1;
}

// UpdateComponentRequest updates an existing Component CR
message UpdateComponentRequest {
  // name is the CR metadata.name (required, from CreateResponse)
  string name = 1;
  // display_name updates the human-readable name if set
  optional string display_name = 2;
  // description updates the short text if set
  optional string description = 3;
  // group updates the logical grouping if set
  optional string group = 4;
  // link updates the external URL if set
  optional string link = 5;
  // status updates the declared operational status if set
  optional ComponentStatus status = 6;
}

// UpdateComponentResponse is returned after updating a component
message UpdateComponentResponse {
  string name = 1;
}

// DeleteComponentRequest deletes a Component CR
message DeleteComponentRequest {
  // name is the CR metadata.name
  string name = 1;
}

// DeleteComponentResponse is returned after deleting a component
message DeleteComponentResponse {}

// CreateMaintenanceRequest creates a new Maintenance CR
message CreateMaintenanceRequest {
  reserved 1;
  // title is the headline displayed on the status page (required)
  string title = 2;
  // description is a longer explanation
  string description = 3;
  // portal_ref is the Portal this maintenance is linked to (required)
  string portal_ref = 4;
  // components is the list of affected Component names
  repeated string components = 5;
  // scheduled_start is the planned start time
  google.protobuf.Timestamp scheduled_start = 6;
  // scheduled_end is the planned end time
  google.protobuf.Timestamp scheduled_end = 7;
  // affected_status is the status applied to components during the maintenance (default: "maintenance")
  string affected_status = 8;
}

// CreateMaintenanceResponse is returned after creating a maintenance
message CreateMaintenanceResponse {
  string name = 1;
}

// UpdateMaintenanceRequest updates an existing Maintenance CR
message UpdateMaintenanceRequest {
  // name is the CR metadata.name (required, identifies the maintenance)
  string name = 1;
  // title updates the headline if set
  optional string title = 2;
  // description updates the description if set
  optional string description = 3;
  // components replaces affected components if non-empty
  repeated string components = 4;
  // scheduled_start updates the planned start time if set
  optional google.protobuf.Timestamp scheduled_start = 5;
  // scheduled_end updates the planned end time if set
  optional google.protobuf.Timestamp scheduled_end = 6;
  // affected_status updates the status applied to components if set
  optional string affected_status = 7;
}

// UpdateMaintenanceResponse is returned after updating a maintenance
message UpdateMaintenanceResponse {
  string name = 1;
}

// DeleteMaintenanceRequest deletes a Maintenance CR
message DeleteMaintenanceRequest {
  string name = 1;
}

// DeleteMaintenanceResponse is returned after deleting a maintenance
message DeleteMaintenanceResponse {}

// CreateIncidentRequest creates a new Incident CR
message CreateIncidentRequest {
  reserved 1;
  // title is the headline of the incident (required)
  string title = 2;
  // portal_ref is the Portal this incident is linked to (required)
  string portal_ref = 3;
  // components is the list of affected Component names
  repeated string components = 4;
  // severity indicates the impact level (required)
  IncidentSeverity severity = 5;
  // initial_update is the first timeline entry (required)
  IncidentUpdate initial_update = 6;
}

// CreateIncidentResponse is returned after creating an incident
message CreateIncidentResponse {
  string name = 1;
}

// UpdateIncidentRequest updates an existing Incident CR
message UpdateIncidentRequest {
  // name is the CR metadata.name (required, identifies the incident)
  string name = 1;
  // title updates the headline if set
  optional string title = 2;
  // components replaces affected components if non-empty
  repeated string components = 3;
  // severity updates the impact level if set
  optional IncidentSeverity severity = 4;
  // update is a new timeline entry appended to the existing timeline (required)
  IncidentUpdate update = 5;
}

// UpdateIncidentResponse is returned after updating an incident
message UpdateIncidentResponse {
  string name = 1;
}

// DeleteIncidentRequest deletes an Incident CR
message DeleteIncidentRequest {
  string name = 1;
}

// DeleteIncidentResponse is returned after deleting an incident
message DeleteIncidentResponse {}
