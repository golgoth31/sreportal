syntax = "proto3";

package sreportal.v1;

import "google/protobuf/timestamp.proto";

// StatusService provides access to platform status page data
service StatusService {
  // --- Read RPCs (public) ---

  // ListComponents returns all platform components with their status
  rpc ListComponents(ListComponentsRequest) returns (ListComponentsResponse);

  // ListMaintenances returns maintenance windows
  rpc ListMaintenances(ListMaintenancesRequest) returns (ListMaintenancesResponse);

  // ListIncidents returns declared incidents
  rpc ListIncidents(ListIncidentsRequest) returns (ListIncidentsResponse);

  // --- Write RPCs (auth-protected) ---

  // UpsertComponent creates or updates a platform component CR
  rpc UpsertComponent(UpsertComponentRequest) returns (UpsertComponentResponse);

  // DeleteComponent deletes a platform component CR
  rpc DeleteComponent(DeleteComponentRequest) returns (DeleteComponentResponse);

  // UpsertMaintenance creates or updates a maintenance window CR
  rpc UpsertMaintenance(UpsertMaintenanceRequest) returns (UpsertMaintenanceResponse);

  // DeleteMaintenance deletes a maintenance window CR
  rpc DeleteMaintenance(DeleteMaintenanceRequest) returns (DeleteMaintenanceResponse);

  // UpsertIncident creates or updates an incident CR
  rpc UpsertIncident(UpsertIncidentRequest) returns (UpsertIncidentResponse);

  // DeleteIncident deletes an incident CR
  rpc DeleteIncident(DeleteIncidentRequest) returns (DeleteIncidentResponse);
}

// ComponentStatus describes the operational status of a platform component
enum ComponentStatus {
  COMPONENT_STATUS_UNSPECIFIED = 0;
  COMPONENT_STATUS_OPERATIONAL = 1;
  COMPONENT_STATUS_DEGRADED = 2;
  COMPONENT_STATUS_PARTIAL_OUTAGE = 3;
  COMPONENT_STATUS_MAJOR_OUTAGE = 4;
  COMPONENT_STATUS_UNKNOWN = 5;
  COMPONENT_STATUS_MAINTENANCE = 6;
}

// MaintenancePhase describes the lifecycle of a maintenance window
enum MaintenancePhase {
  MAINTENANCE_PHASE_UNSPECIFIED = 0;
  MAINTENANCE_PHASE_UPCOMING = 1;
  MAINTENANCE_PHASE_IN_PROGRESS = 2;
  MAINTENANCE_PHASE_COMPLETED = 3;
}

// IncidentPhase describes the resolution stage of an incident
enum IncidentPhase {
  INCIDENT_PHASE_UNSPECIFIED = 0;
  INCIDENT_PHASE_INVESTIGATING = 1;
  INCIDENT_PHASE_IDENTIFIED = 2;
  INCIDENT_PHASE_MONITORING = 3;
  INCIDENT_PHASE_RESOLVED = 4;
}

// IncidentSeverity describes how severe an incident is
enum IncidentSeverity {
  INCIDENT_SEVERITY_UNSPECIFIED = 0;
  INCIDENT_SEVERITY_CRITICAL = 1;
  INCIDENT_SEVERITY_MAJOR = 2;
  INCIDENT_SEVERITY_MINOR = 3;
}

// ComponentResource represents a platform component on the status page
message ComponentResource {
  string name = 1;
  string display_name = 2;
  string description = 3;
  string group = 4;
  string link = 5;
  string portal_ref = 6;
  ComponentStatus declared_status = 7;
  ComponentStatus computed_status = 8;
  int32 active_incidents = 9;
  google.protobuf.Timestamp last_status_change = 10;
}

// MaintenanceResource represents a scheduled maintenance window
message MaintenanceResource {
  string name = 1;
  string title = 2;
  string description = 3;
  string portal_ref = 4;
  repeated string components = 5;
  google.protobuf.Timestamp scheduled_start = 6;
  google.protobuf.Timestamp scheduled_end = 7;
  string affected_status = 8;
  MaintenancePhase phase = 9;
}

// IncidentResource represents a declared incident
message IncidentResource {
  string name = 1;
  string title = 2;
  string portal_ref = 3;
  repeated string components = 4;
  IncidentSeverity severity = 5;
  IncidentPhase current_phase = 6;
  repeated IncidentUpdate updates = 7;
  google.protobuf.Timestamp started_at = 8;
  google.protobuf.Timestamp resolved_at = 9;
  int32 duration_minutes = 10;
}

// IncidentUpdate is a single timeline entry in an incident
message IncidentUpdate {
  google.protobuf.Timestamp timestamp = 1;
  IncidentPhase phase = 2;
  string message = 3;
}

// --- Read request/response messages ---

// ListComponentsRequest filters components
message ListComponentsRequest {
  string portal_ref = 1;
  string group = 2;
}

// ListComponentsResponse contains the list of components
message ListComponentsResponse {
  repeated ComponentResource components = 1;
}

// ListMaintenancesRequest filters maintenances
message ListMaintenancesRequest {
  string portal_ref = 1;
  MaintenancePhase phase = 2;
}

// ListMaintenancesResponse contains the list of maintenances
message ListMaintenancesResponse {
  repeated MaintenanceResource maintenances = 1;
}

// ListIncidentsRequest filters incidents
message ListIncidentsRequest {
  string portal_ref = 1;
  IncidentPhase phase = 2;
}

// ListIncidentsResponse contains the list of incidents
message ListIncidentsResponse {
  repeated IncidentResource incidents = 1;
}

// --- Write request/response messages ---

// UpsertComponentRequest creates or updates a Component CR
message UpsertComponentRequest {
  // name is the CR metadata.name (required)
  string name = 1;
  // display_name is the human-readable name shown on the status page
  string display_name = 2;
  // description is a short text displayed below the component name
  string description = 3;
  // group is a logical grouping (e.g. "Infrastructure", "Applications")
  string group = 4;
  // link is an optional external URL
  string link = 5;
  // portal_ref is the Portal this component is linked to
  string portal_ref = 6;
  // status is the declared operational status
  ComponentStatus status = 7;
}

// UpsertComponentResponse is returned after creating/updating a component
message UpsertComponentResponse {
  // name is the CR name
  string name = 1;
  // created is true if the CR was created (false if updated)
  bool created = 2;
}

// DeleteComponentRequest deletes a Component CR
message DeleteComponentRequest {
  // name is the CR metadata.name
  string name = 1;
}

// DeleteComponentResponse is returned after deleting a component
message DeleteComponentResponse {}

// UpsertMaintenanceRequest creates or updates a Maintenance CR
message UpsertMaintenanceRequest {
  // name is the CR metadata.name (required)
  string name = 1;
  // title is the headline displayed on the status page
  string title = 2;
  // description is a longer explanation
  string description = 3;
  // portal_ref is the Portal this maintenance is linked to
  string portal_ref = 4;
  // components is the list of affected Component names
  repeated string components = 5;
  // scheduled_start is the planned start time
  google.protobuf.Timestamp scheduled_start = 6;
  // scheduled_end is the planned end time
  google.protobuf.Timestamp scheduled_end = 7;
  // affected_status is the status applied to components during the maintenance (default: "maintenance")
  string affected_status = 8;
}

// UpsertMaintenanceResponse is returned after creating/updating a maintenance
message UpsertMaintenanceResponse {
  string name = 1;
  bool created = 2;
}

// DeleteMaintenanceRequest deletes a Maintenance CR
message DeleteMaintenanceRequest {
  string name = 1;
}

// DeleteMaintenanceResponse is returned after deleting a maintenance
message DeleteMaintenanceResponse {}

// UpsertIncidentRequest creates or updates an Incident CR
message UpsertIncidentRequest {
  // name is the CR metadata.name (required)
  string name = 1;
  // title is the headline of the incident
  string title = 2;
  // portal_ref is the Portal this incident is linked to
  string portal_ref = 3;
  // components is the list of affected Component names
  repeated string components = 4;
  // severity indicates the impact level
  IncidentSeverity severity = 5;
  // updates is the full timeline (replaces all existing updates)
  repeated IncidentUpdate updates = 6;
}

// UpsertIncidentResponse is returned after creating/updating an incident
message UpsertIncidentResponse {
  string name = 1;
  bool created = 2;
}

// DeleteIncidentRequest deletes an Incident CR
message DeleteIncidentRequest {
  string name = 1;
}

// DeleteIncidentResponse is returned after deleting an incident
message DeleteIncidentResponse {}
