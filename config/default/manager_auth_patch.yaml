# This patch mounts the auth Secret and adds the --auth-config flag
# to enable authentication on write endpoints (e.g. AddRelease).

# Add the --auth-config argument
- op: add
  path: /spec/template/spec/containers/0/args/-
  value: --auth-config=/etc/sreportal/auth/config.yaml

# Add the volumeMount for the auth configuration
- op: add
  path: /spec/template/spec/containers/0/volumeMounts/-
  value:
    mountPath: /etc/sreportal/auth
    name: auth-config
    readOnly: true

# Add the volume referencing the auth Secret
- op: add
  path: /spec/template/spec/volumes/-
  value:
    name: auth-config
    secret:
      secretName: auth
