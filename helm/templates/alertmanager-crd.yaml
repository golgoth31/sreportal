apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: alertmanagers.sreportal.io
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.0
  labels:
  {{- include "helm.labels" . | nindent 4 }}
spec:
  group: sreportal.io
  names:
    kind: Alertmanager
    listKind: AlertmanagerList
    plural: alertmanagers
    singular: alertmanager
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.portalRef
      name: Portal
      type: string
    - jsonPath: .status.activeAlerts
      name: Active Alerts
      type: integer
    - jsonPath: .status.lastReconcileTime
      name: Last Reconcile
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Alertmanager is the Schema for the alertmanagers API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of Alertmanager
            properties:
              isRemote:
                description: |-
                  IsRemote indicates that the corresponding portal is remote and the operator should fetch alerts from the remote portal instead of local Alertmanager API.
                  This field is used to determine how to fetch alerts.
                type: boolean
              portalRef:
                description: portalRef is the name of the Portal this Alertmanager resource
                  is linked to
                minLength: 1
                type: string
              url:
                description: url contains the Alertmanager API endpoints
                properties:
                  local:
                    description: local is the URL used by the controller to fetch active
                      alerts (e.g. http://alertmanager.monitoring:9093)
                    pattern: ^https?://.*
                    type: string
                  remote:
                    description: remote is an optional externally-reachable URL for
                      dashboard links
                    pattern: ^https?://.*
                    type: string
                required:
                - local
                type: object
            required:
            - portalRef
            - url
            type: object
          status:
            description: status defines the observed state of Alertmanager
            properties:
              activeAlerts:
                description: activeAlerts is the list of currently firing alerts retrieved
                  from the Alertmanager API
                items:
                  description: AlertStatus represents a single active alert from Alertmanager
                  properties:
                    annotations:
                      additionalProperties:
                        type: string
                      description: annotations are additional informational key-value
                        pairs
                      type: object
                    endsAt:
                      description: endsAt is when the alert is expected to resolve
                      format: date-time
                      type: string
                    fingerprint:
                      description: fingerprint is the unique identifier of the alert
                      type: string
                    labels:
                      additionalProperties:
                        type: string
                      description: labels are the identifying key-value pairs of the
                        alert
                      type: object
                    receivers:
                      description: receivers are the notification integrations this
                        alert is routed to
                      items:
                        type: string
                      type: array
                    silencedBy:
                      description: silencedBy contains the IDs of silences that suppress
                        this alert
                      items:
                        type: string
                      type: array
                    startsAt:
                      description: startsAt is when the alert started firing
                      format: date-time
                      type: string
                    state:
                      description: state is the alert state (active, suppressed, unprocessed)
                      enum:
                      - active
                      - suppressed
                      - unprocessed
                      type: string
                    updatedAt:
                      description: updatedAt is the last time the alert was updated
                      format: date-time
                      type: string
                  required:
                  - fingerprint
                  - labels
                  - startsAt
                  - state
                  - updatedAt
                  type: object
                type: array
              conditions:
                description: conditions represent the current state of the Alertmanager
                  resource.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              lastReconcileTime:
                description: lastReconcileTime is the timestamp of the last reconciliation
                format: date-time
                type: string
              silences:
                description: silences is the list of active silences for identifying
                  silenced alerts
                items:
                  description: SilenceStatus represents a silence from Alertmanager
                    (for identifying silenced alerts)
                  properties:
                    comment:
                      type: string
                    createdBy:
                      type: string
                    endsAt:
                      format: date-time
                      type: string
                    id:
                      type: string
                    matchers:
                      items:
                        description: MatcherStatus is a label matcher within a silence
                        properties:
                          isRegex:
                            type: boolean
                          name:
                            type: string
                          value:
                            type: string
                        required:
                        - isRegex
                        - name
                        - value
                        type: object
                      type: array
                    startsAt:
                      format: date-time
                      type: string
                    status:
                      type: string
                    updatedAt:
                      format: date-time
                      type: string
                  required:
                  - comment
                  - createdBy
                  - endsAt
                  - id
                  - matchers
                  - startsAt
                  - status
                  - updatedAt
                  type: object
                type: array
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
status:
  acceptedNames:
    kind: ""
    plural: ""
  conditions: []
  storedVersions: []
