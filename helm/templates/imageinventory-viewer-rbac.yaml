apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "helm.fullname" . }}-imageinventory-viewer-role
  labels:
  {{- include "helm.labels" . | nindent 4 }}
rules:
- apiGroups:
  - sreportal.io
  resources:
  - imageinventories
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - sreportal.io
  resources:
  - imageinventories/status
  verbs:
  - get
