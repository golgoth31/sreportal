apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: flowobservers.sreportal.io
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.0
  labels:
  {{- include "helm.labels" . | nindent 4 }}
spec:
  group: sreportal.io
  names:
    kind: FlowObserver
    listKind: FlowObserverList
    plural: flowobservers
    singular: flowobserver
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.portalRef
      name: Portal
      type: string
    - jsonPath: .status.activeMesh
      name: Active Mesh
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          FlowObserver is the Schema for the flowobservers API.
          It configures how the operator detects real traffic on network edges
          by querying Prometheus for mesh/CNI flow metrics.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of FlowObserver
            properties:
              metrics:
                description: |-
                  metrics defines the list of mesh metric descriptors to probe.
                  Each descriptor describes how a specific CNI/mesh exposes flow metrics in Prometheus.
                  When empty, the built-in defaults (Hubble, Istio, Linkerd) are used.
                  The observer probes each descriptor in order and uses the first one that returns results.
                items:
                  description: |-
                    FlowMetricDescriptor describes how a specific CNI or service mesh exposes
                    flow metrics in Prometheus. The observer probes each descriptor in order
                    and uses the first one whose probeQuery returns results.
                  properties:
                    destinationNamespaceLabel:
                      description: destinationNamespaceLabel is the Prometheus label
                        name for the destination namespace
                      type: string
                    destinationWorkloadLabel:
                      description: destinationWorkloadLabel is the Prometheus label
                        name for the destination workload
                      type: string
                    name:
                      description: name is a human-readable identifier for this mesh/CNI
                        (e.g. "istio", "hubble", "linkerd")
                      minLength: 1
                      type: string
                    observedQueryTemplate:
                      description: |-
                        observedQueryTemplate is a PromQL query template returning one result per source/destination pair.
                        Use %s as placeholder for the query window (e.g. "5m").
                        Must use "max by" with the label names defined below.
                      minLength: 1
                      type: string
                    probeQuery:
                      description: |-
                        probeQuery is a PromQL query used to detect if this mesh is active.
                        Should return a non-empty vector when the mesh is present (e.g. "count(istio_requests_total)").
                      minLength: 1
                      type: string
                    sourceNamespaceLabel:
                      description: sourceNamespaceLabel is the Prometheus label name
                        for the source namespace
                      type: string
                    sourceWorkloadLabel:
                      description: sourceWorkloadLabel is the Prometheus label name
                        for the source workload
                      type: string
                  required:
                  - destinationNamespaceLabel
                  - destinationWorkloadLabel
                  - name
                  - observedQueryTemplate
                  - probeQuery
                  - sourceNamespaceLabel
                  - sourceWorkloadLabel
                  type: object
                type: array
              portalRef:
                description: portalRef is the name of the Portal this observer is linked
                  to
                minLength: 1
                type: string
              prometheus:
                description: prometheus configures the Prometheus-based flow observation
                properties:
                  address:
                    description: address is the Prometheus server URL
                    minLength: 1
                    type: string
                  queryWindow:
                    default: 5m
                    description: queryWindow is the PromQL range window for flow queries
                      (e.g. "5m")
                    type: string
                required:
                - address
                type: object
            required:
            - portalRef
            - prometheus
            type: object
          status:
            description: status defines the observed state of FlowObserver
            properties:
              activeMesh:
                description: activeMesh is the name of the detected mesh provider (empty
                  if none detected)
                type: string
              conditions:
                description: conditions represent the current state of the FlowObserver
                  resource.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
status:
  acceptedNames:
    kind: ""
    plural: ""
  conditions: []
  storedVersions: []
