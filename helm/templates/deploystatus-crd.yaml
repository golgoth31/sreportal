                      format: date-time
                      type: string
                    deployedRef:
                      description: deployedRef is the deployed commit SHA (OCI revision
                        label) or git tag (semver fallback).
                      type: string
                    error:
                      description: error carries the last per-entry error message (set
                        when state=error).
                      type: string
                    image:
                      description: image is the deployed image reference observed on
                        the running Pod.
                      minLength: 1
                      type: string
                    key:
                      description: key is sha256(image|workloadKind|workloadNamespace|workloadName|container)[:16].
                      minLength: 1
                      type: string
                    lastCheckedAt:
                      description: lastCheckedAt paces re-checks (isDue); set on every
