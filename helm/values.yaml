config:
  configYaml: |-
    sources:
      service:
        enabled: true
        namespace: ""
        annotationFilter: ""
        serviceTypeFilter:
          - LoadBalancer
          - ExternalName
          - ClusterIP
        publishInternal: true
        publishHostIP: false
      ingress:
        enabled: true
        namespace: ""
        ingressClassNames: []
      dnsEndpoint:
        enabled: false
        namespace: ""
      istioGateway:
        enabled: true
        namespace: ""
      istioVirtualService:
        enabled: false
        namespace: ""
      # Gateway API route sources (requires Gateway API CRDs v1.0+)
      gatewayHTTPRoute:
        enabled: false
        namespace: ""
        gatewayName: ""
        gatewayNamespace: ""
        gatewayLabelFilter: ""
      gatewayGRPCRoute:
        enabled: false
        namespace: ""
      gatewayTLSRoute:
        enabled: false
        namespace: ""
      gatewayTCPRoute:
        enabled: false
        namespace: ""
      gatewayUDPRoute:
        enabled: false
        namespace: ""
      # Priority defines which source wins when the same FQDN+RecordType is discovered
      # by multiple sources. Sources listed first take precedence.
      # Remove or leave empty to merge targets from all sources (default).
      priority:
        - dnsendpoint
        - gateway-httproute
        - gateway-grpcroute
        - gateway-tlsroute
        - gateway-tcproute
        - gateway-udproute
        - ingress
        - service
        - istio-gateway
        - istio-virtualservice
    groupMapping:
      defaultGroup: "Services"
    reconciliation:
      interval: 5m
      retryOnError: 30s
      disableDNSCheck: false
    # Authentication for write endpoints (e.g. AddRelease).
    # Each method has an "enabled" flag. Multiple methods can coexist (chain).
    auth:
      # API key authentication — the secret value is read from an environment variable.
      apiKey:
        enabled: false
        headerName: "X-API-Key"        # HTTP header to check (default: "X-API-Key")
      # JWT Bearer token authentication
      jwt:
        enabled: false
        issuers: []
controllerManager:
  manager:
    args:
      - '--metrics-bind-address=:8443'
      - '--leader-elect'
      - '--health-probe-bind-address=:9090'
      - '--webhook-cert-path=/tmp/k8s-webhook-server/serving-certs'
      - '--enable-mcp'
    containerSecurityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      readOnlyRootFilesystem: true
    image:
      repository: ghcr.io/golgoth31/sreportal
      tag: 1.32.1@sha256:72f585d4ee9fe330c9d5516df97dc5b9a6d40500191879c17667bd818f24738f
    resources:
      limits:
        cpu: 500m
        memory: 128Mi
      requests:
        cpu: 10m
        memory: 64Mi
  nodeSelector: {}
  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  replicas: 1
  tolerations: []
  topologySpreadConstraints: []
kubernetesClusterDomain: cluster.local
metricsService:
  ports:
    - name: metrics
      port: 8443
      protocol: TCP
      targetPort: 8443
  type: ClusterIP
serviceAccount:
  annotations: {}
  automount: true
  create: true
  name: ''
webMcpService:
  ports:
    - name: http
      port: 8090
      protocol: TCP
      targetPort: 8090
  type: ClusterIP
webhookService:
  ports:
    - port: 443
      protocol: TCP
      targetPort: 9443
  type: ClusterIP
auth:
  enabled: false
  secretRef: ''
  secretKey: ''
flowObserver:
  enabled: false
  name: flow-observer-main
  portalRef: main
  reconcileInterval: 5m
  evaluatedEdgeTypes:
    - service
  prometheus:
    address: http://prometheus.internal
    queryWindow: 5m
  metrics: []
extraVolumes: []
extraVolumeMounts: []
